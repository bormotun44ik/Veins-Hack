services:
  shadoclaw:
    build: ./vendor/shadoclaw
    container_name: veins-shadoclaw
    ports:
      - "8317:8317"
    environment:
      # По умолчанию слушает 127.0.0.1 — внутри контейнера это не доступно снаружи.
      # Слушаем 0.0.0.0, чтобы порт-forward 8317:8317 работал.
      - OPENPROXY_HOST=0.0.0.0
      # ОБЯЗАТЕЛЬНО: без этого Anthropic блокирует запрос (system prompt не соответствует
      # Claude Code CLI). См. vendor/shadoclaw/PROXY-README.md §3.
      - OPENPROXY_STRIP_SYSTEM=1
    # OAuth-аккаунты и токены хоста (заранее сделать: openproxy account import main)
    volumes:
      - ${HOME}/.config/openproxy:/root/.config/openproxy
      - ${HOME}/.config/anthropic/q:/root/.config/anthropic/q
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: veins-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts:ro
      - veins-db:/app/db
    environment:
      - DATABASE_PATH=/app/db/veins.db
      - DATA_DIR=/app/data
      # ВАЖНО: Anthropic SDK сам добавит /v1/messages к base_url → НЕ ставим /v1 в URL
      - SHADOCLAW_BASE_URL=http://shadoclaw:8317
    depends_on:
      - shadoclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Seed только если БД ещё нет (идемпотентно). --fresh сбрасывает кэш LLM —
    # для прогретого демо НЕ используй --fresh.
    command: >
      sh -c "test -f /app/db/veins.db || python scripts/seed_demo.py --fresh;
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: veins-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  veins-db:
