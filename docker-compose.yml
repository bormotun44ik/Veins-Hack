services:
  backend:
    build: ./backend
    container_name: veins-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts:ro
      - veins-db:/app/db
    environment:
      - DATABASE_PATH=/app/db/veins.db
      - DATA_DIR=/app/data
      - SHADOCLAW_BASE_URL=http://host.docker.internal:8317/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Seed только если БД ещё нет (идемпотентно). --fresh сбрасывает кэш LLM —
    # для прогретого демо НЕ используй --fresh.
    command: >
      sh -c "test -f /app/db/veins.db || python scripts/seed_demo.py --fresh;
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: veins-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  veins-db:
